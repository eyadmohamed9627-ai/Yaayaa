<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YAAYAA | Shopping System</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --brand: #d4a373; --bg: #fdf2f8; --dark: #1a1a1a; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { background-color: white; color: var(--dark); }

        /* الهيدر */
        .navbar { 
            padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; 
            background: white; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid #eee;
        }
        .cart-trigger { position: relative; cursor: pointer; font-size: 1.4rem; color: var(--dark); }
        .badge { position: absolute; top: -5px; right: -8px; background: var(--brand); color: white; font-size: 0.7rem; padding: 2px 6px; border-radius: 50%; }

        /* شبكة المنتجات */
        .products-container { padding: 15px; display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .card { background: white; border-radius: 15px; overflow: hidden; border: 1px solid #f0f0f0; }
        .card img { width: 100%; height: 180px; object-fit: cover; }
        .card-body { padding: 10px; text-align: center; }
        .card-price { color: var(--brand); font-weight: 900; }

        /* نافذة تفاصيل المنتج (زي الصورة الأولى) */
        .product-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: white; z-index: 2000; display: none; flex-direction: column;
        }
        .close-overlay { position: absolute; top: 20px; right: 20px; font-size: 1.5rem; cursor: pointer; }
        .p-image { width: 100%; height: 50vh; object-fit: cover; }
        .p-details { padding: 20px; }
        .p-title { font-size: 1.8rem; font-weight: 900; margin-bottom: 10px; }
        .p-prices { margin-bottom: 20px; font-size: 1.4rem; }
        .old-p { text-decoration: line-through; color: #ccc; margin-left: 10px; }

        /* شريط الإضافة للسلة السفلي */
        .action-bar {
            position: fixed; bottom: 0; left: 0; width: 100%; background: white;
            padding: 20px; display: flex; gap: 10px; border-top: 1px solid #eee;
        }
        .qty-selector { display: flex; align-items: center; border: 1px solid #eee; border-radius: 10px; padding: 0 10px; }
        .qty-btn { border: none; background: none; font-size: 1.2rem; padding: 5px 10px; cursor: pointer; }
        .add-btn { flex: 1; background: var(--dark); color: white; border: none; border-radius: 10px; font-weight: 700; cursor: pointer; }

        /* السلة (زي الصورة الثانية والثالثة) */
        .cart-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #fafafa; z-index: 3000; display: none; flex-direction: column; overflow-y: auto;
        }
        .cart-content { padding: 20px; }
        .cart-item { display: flex; gap: 15px; background: white; padding: 10px; border-radius: 15px; margin-bottom: 10px; align-items: center; }
        .cart-item img { width: 60px; height: 60px; border-radius: 10px; }

        .form-section { background: white; padding: 25px; border-radius: 20px; margin-top: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.02); }
        .form-section h3 { margin-bottom: 20px; text-align: center; }
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; margin-bottom: 5px; font-weight: 700; font-size: 0.9rem; }
        .input-group input { width: 100%; padding: 15px; border: 1px solid #eee; border-radius: 12px; background: #fdfdfd; outline: none; }

        .confirm-btn { width: 100%; padding: 18px; background: var(--dark); color: white; border: none; border-radius: 12px; font-weight: 800; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo">YAAYAA</div>
        <div class="cart-trigger" onclick="openCart()">
            <i class="fas fa-shopping-bag"></i>
            <span class="badge" id="cartCount">0</span>
        </div>
    </nav>

    <div class="products-container" id="grid"></div>

    <div class="product-overlay" id="pOverlay">
        <i class="fas fa-times close-overlay" onclick="closeProduct()"></i>
        <img src="" id="pImg" class="p-image">
        <div class="p-details">
            <h2 id="pTitle" class="p-title"></h2>
            <div class="p-prices">
                <span id="pPrice" style="color:var(--brand); font-weight:900;"></span>
                <span id="pOld" class="old-p"></span>
            </div>
            <p style="color:#666; font-size:0.9rem;">تفاصيل الشنطة: جلد طبيعي بتصميم مميز، تناسب جميع الخروجات.</p>
        </div>
        <div class="action-bar">
            <div class="qty-selector">
                <button class="qty-btn" onclick="changeQty(-1)">-</button>
                <span id="qtyVal" style="font-weight:700; margin:0 10px;">1</span>
                <button class="qty-btn" onclick="changeQty(1)">+</button>
            </div>
            <button class="add-btn" onclick="addToCart()">🛍️ إتمام الطلب الآن</button>
        </div>
    </div>

    <div class="cart-overlay" id="cartOverlay">
        <div class="navbar" style="position:static;">
            <h3>سلة المشتريات ✨</h3>
            <i class="fas fa-times" onclick="closeCart()" style="cursor:pointer;"></i>
        </div>
        
        <div class="cart-content">
            <div id="cartItemsList"></div>

            <form action="https://formspree.io/f/xjgjkvqv" method="POST" class="form-section">
                <h3>بيانات التوصيل ✨🚚</h3>
                <input type="hidden" name="الطلبات" id="hiddenCartData">
                <input type="hidden" name="الإجمالي" id="hiddenTotal">

                <div class="input-group">
                    <label>الاسم بالكامل</label>
                    <input type="text" name="الاسم" placeholder="اكتب اسمك الثلاثي..." required>
                </div>
                <div class="input-group">
                    <label>رقم الموبايل</label>
                    <input type="tel" name="الموبايل" placeholder="رقم متاح للاتصال..." required>
                </div>
                <div class="input-group">
                    <label>العنوان بالتفصيل</label>
                    <input type="text" name="العنوان" placeholder="المحافظة - المنطقة - اسم الشارع" required>
                </div>

                <button type="submit" class="confirm-btn">تأكيد الطلب | Confirm 🛍️</button>
            </form>
        </div>
    </div>

    <script>
        const bags = [
            { id: 1, name: "قلب روان", price: 850, old: 1100, img: "https://i.ibb.co/PsNk8D6b/IMG-1874.jpg" },
            { id: 2, name: "كوتش نود", price: 1200, old: 1500, img: "https://i.ibb.co/PsNk8D6b/IMG-1874.jpg" }
        ];

        let cart = [];
        let currentBag = null;

        function render() {
            const grid = document.getElementById('grid');
            grid.innerHTML = bags.map(b => `
                <div class="card" onclick="openProduct(${b.id})">
                    <img src="${b.img}">
                    <div class="card-body">
                        <div>${b.name}</div>
                        <div class="card-price">LE ${b.price}</div>
                    </div>
                </div>
            `).join('');
        }

        function openProduct(id) {
            currentBag = bags.find(b => b.id === id);
            document.getElementById('pImg').src = currentBag.img;
            document.getElementById('pTitle').innerText = currentBag.name;
            document.getElementById('pPrice').innerText = "LE " + currentBag.price;
            document.getElementById('pOld').innerText = "LE " + currentBag.old;
            document.getElementById('qtyVal').innerText = 1;
            document.getElementById('pOverlay').style.display = 'flex';
        }

        function closeProduct() { document.getElementById('pOverlay').style.display = 'none'; }

        function changeQty(n) {
            let q = document.getElementById('qtyVal');
            let val = parseInt(q.innerText) + n;
            if(val > 0) q.innerText = val;
        }

        function addToCart() {
            const qty = parseInt(document.getElementById('qtyVal').innerText);
            cart.push({ ...currentBag, qty });
            updateCart();
            closeProduct();
            openCart(); // بيفتح السلة تلقائياً بعد الإضافة
        }

        function openCart() { document.getElementById('cartOverlay').style.display = 'flex'; }
        function closeCart() { document.getElementById('cartOverlay').style.display = 'none'; }

        function updateCart() {
            document.getElementById('cartCount').innerText = cart.length;
            const list = document.getElementById('cartItemsList');
            let total = 0;
            let summary = "";

            list.innerHTML = cart.map((item, index) => {
                total += (item.price * item.qty);
                summary += `${item.name} (عدد ${item.qty}), `;
                return `
                    <div class="cart-item">
                        <img src="${item.img}">
                        <div style="flex:1">
                            <div style="font-weight:900">${item.name}</div>
                            <div style="color:var(--brand)">${item.qty} x ${item.price} LE</div>
                        </div>
                        <i class="fas fa-trash" onclick="removeItem(${index})" style="color:#ff4d4d"></i>
                    </div>
                `;
            }).join('');

            document.getElementById('hiddenCartData').value = summary;
            document.getElementById('hiddenTotal').value = total + " LE";
        }

        function removeItem(i) { cart.splice(i, 1); updateCart(); }

        render();
    </script>
</body>
</html>
