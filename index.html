<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

    <title>YAAYAA STORE | Luxury Leather Bags ✨</title>

    <style>
        /* 🟢 لوحة الألوان الفخمة (من اللوجو) 🟢 */
        :root {
            --nude-light: #fef7f1; /* نود فاتح خلفية */
            --nude-logo: #d4a373; /* لون النود اللي في اللوجو */
            --hafan-dark: #8b4513; /* لون هافان غامق (جلد) */
            --dark-royal: #1a1a1a; /* أسود ملكي */
            --white: #ffffff;
            --font-main: 'Inter', 'Cairo', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: var(--font-main); }
        body { background-color: var(--nude-light); color: var(--dark-royal); overflow-x: hidden; }

        /* الهيدر الشيك */
        .navbar { 
            padding: 20px; display: flex; justify-content: space-between; align-items: center; 
            background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px);
            position: sticky; top: 0; z-index: 1000; box-shadow: 0 4px 15px rgba(139, 69, 19, 0.03);
        }
        .logo { font-weight: 800; font-size: 1.6rem; letter-spacing: 2px; color: var(--dark-royal); text-decoration: none; text-transform: uppercase; }
        .cart-icon { position: relative; cursor: pointer; font-size: 1.5rem; color: var(--hafan-dark); }
        .badge { position: absolute; top: -5px; right: -8px; background: #fb7185; color: white; font-size: 0.7rem; padding: 3px 7px; border-radius: 50%; font-weight: bold; }

        /* 🟡 واجهة الموقع الملكية (اللوجو مع Shop Now) 🟡 */
        .hero-section {
            width: 100%;
            height: 90vh; /* واخد عرض الشاشة كله */
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.7)), url('https://i.ibb.co/wJv0qQ6/image-4.png') no-repeat center; /* لينك صورة اللوجو والجلد */
            background-size: cover;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: var(--white);
            padding: 40px;
        }
        .hero-section h1 { font-family: 'Cairo', sans-serif; font-size: 3rem; font-weight: 900; margin-bottom: 10px; text-shadow: 0 2px 5px rgba(0,0,0,0.5); }
        .hero-section p { font-size: 1.2rem; font-weight: 400; margin-bottom: 30px; opacity: 0.9; }
        .shop-now-btn {
            background-color: var(--nude-logo);
            color: var(--dark-royal);
            padding: 18px 45px;
            border: none;
            border-radius: 50px;
            font-weight: 800;
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 10px 20px rgba(212, 163, 115, 0.3);
            font-family: 'Cairo', sans-serif;
        }
        .shop-now-btn:hover { background-color: var(--hafan-dark); color: var(--white); transform: scale(1.03); }

        /* حاوية الشنط (رصيد المنتجات) */
        .container { padding: 30px 15px; max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
        .product-card { background: white; border-radius: 0px; /* حواف حادة للفخامة */ overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.02); cursor: pointer; transition: 0.3s ease-out; position: relative; border: 1px solid rgba(0,0,0,0.01); }
        .product-card:hover { opacity: 0.8; transform: translateY(-3px); }
        .product-card img { width: 100%; height: 260px; object-fit: cover; background: #fafafa; }
        .sale-tag { position: absolute; top: 12px; left: 12px; background: var(--dark-royal); color: white; padding: 4px 10px; border-radius: 50px; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; }

        .product-info { padding: 18px; text-align: center; }
        .product-name { font-weight: 700; font-size: 1rem; margin-bottom: 8px; color: #333; }
        .price-row { display: flex; justify-content: center; align-items: baseline; gap: 8px; }
        .product-price { color: var(--hafan-dark); font-weight: 800; font-size: 1.1rem; }
        .old-price { color: #ccc; text-decoration: line-through; font-size: 0.9rem; }

        /* صفحة تفاصيل الشنطة (Luxury Ticket) */
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: white; z-index: 2000; display: none; overflow-y: auto;
            animation: slideUp 0.5s cubic-bezier(0, 0, 0.2, 1);
        }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

        .close-overlay { position: fixed; top: 25px; right: 25px; z-index: 2100; background: white; width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 15px rgba(0,0,0,0.08); color: var(--dark-royal); font-size: 1.2rem; cursor: pointer; }

        .hero-img { width: 100%; height: 60vh; object-fit: cover; transition: 0.3s; }
        .hero-content { padding: 40px 25px; padding-bottom: 140px; max-width: 700px; margin: 0 auto; }
        .details-title { font-size: 2.2rem; font-weight: 900; margin-bottom: 15px; color: var(--dark-royal); }
        
        /* الأسعار الفخمة المخصومة بوضوح */
        .details-prices { display: flex; align-items: center; gap: 15px; margin-bottom: 30px; }
        .now-p { font-size: 2.6rem; font-weight: 900; color: var(--hafan-dark); }
        .was-p { font-size: 1.4rem; color: #ddd; text-decoration: line-through; }

        /* سواتش الألوان */
        .swatch-box { margin-bottom: 30px; }
        .swatch-title { font-weight: 700; margin-bottom: 10px; display: block; color: var(--hafan-dark); }
        .swatch-grid { display: flex; gap: 15px; }
        .swatch-circle { width: 40px; height: 40px; border-radius: 50%; border: 2px solid #eee; cursor: pointer; transition: 0.3s; }
        .swatch-circle.active { border-color: var(--nude-logo); transform: scale(1.05); box-shadow: 0 0 10px rgba(212, 163, 115, 0.4); }

        /* بار التحكم السفلي */
        .checkout-bar {
            position: fixed; bottom: 0; left: 0; width: 100%; background: white;
            padding: 25px; display: flex; gap: 15px; box-shadow: 0 -15px 35px rgba(0,0,0,0.05); z-index: 2200;
        }
        .qty-control { display: flex; align-items: center; border: 1.5px solid #eee; border-radius: 20px; padding: 0 15px; }
