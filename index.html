<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YAAYAA STORE | Checkout Mode</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: #ffffff; overflow-x: hidden; }

        /* الهيدر */
        .navbar { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; position: sticky; top: 0; background: #fff; z-index: 100; }
        .logo { font-weight: 800; font-size: 1.2rem; letter-spacing: 1px; }

        /* كرت المنتج */
        .product-container { padding: 20px; max-width: 600px; margin: 0 auto; }
        .product-img { width: 100%; border-radius: 12px; margin-bottom: 15px; }
        .product-title { font-size: 1.5rem; font-weight: 700; margin-bottom: 10px; }
        
        .price-box { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
        .price-now { font-size: 1.8rem; font-weight: 800; }
        .price-was { color: #aaa; text-decoration: line-through; font-size: 1.1rem; }

        /* مودال (نافذة) بيانات التوصيل */
        .checkout-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); z-index: 2000; display: none;
            justify-content: center; align-items: flex-end;
        }
        .checkout-sheet {
            background: white; width: 100%; max-width: 500px;
            padding: 30px 20px; border-radius: 25px 25px 0 0;
            animation: slideUp 0.3s ease-out;
        }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

        .sheet-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .sheet-header h3 { font-weight: 800; font-size: 1.2rem; }

        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 0.9rem; }
        .input-group input, .input-group textarea {
            width: 100%; padding: 15px; border: 1px solid #ddd; border-radius: 10px;
            font-size: 1rem; outline: none; background: #f9f9f9;
        }

        /* البار السفلي */
        .footer-action {
            position: fixed; bottom: 0; left: 0; width: 100%; background: #fff;
            padding: 15px 20px; border-top: 1px solid #eee; display: flex; gap: 10px; z-index: 1000;
        }
        .qty-box { display: flex; align-items: center; border: 1px solid #ddd; border-radius: 10px; padding: 0 10px; }
        .qty-btn { border: none; background: none; font-size: 1.5rem; padding: 5px 10px; cursor: pointer; }

        .primary-btn {
            flex: 1; background: #000; color: #fff; border: none;
            padding: 18px; border-radius: 10px; font-weight: 700; font-size: 1rem; cursor: pointer;
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <i class="fas fa-bars"></i>
        <div class="logo">YAAYAA STORE</div>
        <i class="fas fa-shopping-bag"></i>
    </nav>

    <div class="product-container">
        <img src="https://i.ibb.co/0V2N7xW/diesel-cap.jpg" class="product-img">
        <h1 class="product-title">Diesel Classic Cap</h1>
        <div class="price-box">
            <span class="price-now">LE 350</span>
            <span class="price-was">LE 500</span>
        </div>
        <p style="color: #666; font-size: 0.9rem; line-height: 1.6;">خامات مستوردة، تقفيل عالي الجودة، متاح بجميع الألوان.</p>
    </div>

    <div class="footer-action">
        <div class="qty-box">
            <button class="qty-btn" onclick="updateQty(-1)">-</button>
            <span id="main-qty" style="margin: 0 10px; font-weight: 700;">1</span>
            <button class="qty-btn" onclick="updateQty(1)">+</button>
        </div>
        <button class="primary-btn" onclick="showCheckout()">إتمام الطلب | Buy Now 🛍️</button>
    </div>

    <div class="checkout-overlay" id="checkoutOverlay">
        <form class="checkout-sheet" action="https://formspree.io/f/xjgjkvqv" method="POST">
            <div class="sheet-header">
                <h3>بيانات التوصيل 🚚</h3>
                <i class="fas fa-times" onclick="closeCheckout()" style="cursor:pointer; font-size:1.2rem;"></i>
            </div>

            <input type="hidden" name="Product" value="Diesel Classic Cap">
            <input type="hidden" name="Price" value="350 LE">
            <input type="hidden" name="Quantity" id="hidden-qty" value="1">

            <div class="input-group">
                <label>الاسم بالكامل</label>
                <input type="text" name="Name" placeholder="اكتب اسمك الثلاثي..." required>
            </div>
            <div class="input-group">
                <label>رقم الموبايل</label>
                <input type="tel" name="Phone" placeholder="رقم متاح للاتصال..." required>
            </div>
            <div class="input-group">
                <label>العنوان بالتفصيل</label>
                <textarea name="Address" rows="3" placeholder="المحافظة - المنطقة - اسم الشارع" required></textarea>
            </div>

            <button type="submit" class="primary-btn" style="width: 100%; margin-top: 10px;">تأكيد الأوردر | Confirm ✅</button>
        </form>
    </div>

    <script>
        function updateQty(n) {
            let q = document.getElementById('main-qty');
            let h = document.getElementById('hidden-qty');
            let val = parseInt(q.innerText) + n;
            if(val < 1) val = 1;
            q.innerText = val;
            h.value = val;
        }

        function showCheckout() {
            document.getElementById('checkoutOverlay').style.display = 'flex';
            document.body.style.overflow = 'hidden'; // منع السكرول
        }

        function closeCheckout() {
            document.getElementById('checkoutOverlay').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        // غلق النافذة عند الضغط خارجها
        window.onclick = function(event) {
            let overlay = document.getElementById('checkoutOverlay');
            if (event.target == overlay) {
                closeCheckout();
            }
        }
    </script>
</body>
</html>
