<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YAAYAA STORE ✨</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --nude-logo: #d4a373; 
            --hafan-dark: #8b4513; 
            --dark-royal: #1a1a1a;
            --bg-light: #fef7f1;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { background-color: var(--bg-light); color: var(--dark-royal); line-height: 1.6; }

        /* Navbar */
        .navbar { 
            padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; 
            background: white; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid #eee;
        }
        .logo { font-weight: 900; font-size: 1.4rem; color: var(--dark-royal); text-decoration: none; letter-spacing: 2px; }
        .cart-icon { position: relative; cursor: pointer; font-size: 1.4rem; color: var(--hafan-dark); transition: 0.3s; }
        .badge { position: absolute; top: -5px; right: -8px; background: #fb7185; color: white; font-size: 0.7rem; padding: 2px 6px; border-radius: 50%; }

        /* Hero Section */
        .hero {
            height: 40vh; 
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), 
            url('https://i.ibb.co/zTXJKbdZ/IMG-1884.jpg') no-repeat center;
            background-size: cover; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            color: white; 
            text-align: center;
        }
        .hero h1 { font-size: 2.5rem; font-weight: 900; margin-bottom: 5px; }

        /* Category Filter */
        .filter-tabs {
            display: flex;
            justify-content: center;
            gap: 10px;
            padding: 20px 10px;
            position: sticky;
            top: 60px;
            background: var(--bg-light);
            z-index: 900;
        }
        .tab-btn {
            padding: 8px 25px;
            border-radius: 20px;
            border: 1px solid var(--nude-logo);
            background: white;
            cursor: pointer;
            font-weight: 700;
            transition: 0.3s;
        }
        .tab-btn.active {
            background: var(--nude-logo);
            color: white;
        }

        /* Product Grid */
        .container { padding: 10px; display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; max-width: 800px; margin: auto; }
        .card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.05); cursor: pointer; transition: 0.3s; }
        .card img { width: 100%; height: 220px; object-fit: cover; display: block; }
        .card-info { padding: 12px; text-align: center; }
        .price { color: var(--hafan-dark); font-weight: 900; margin-top: 5px; }

        /* Overlays */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 2000; display: none; overflow-y: auto; }
        .close { position: absolute; top: 20px; right: 20px; font-size: 1.5rem; z-index: 10; cursor: pointer; background: rgba(255,255,255,0.8); width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; border-radius: 50%; }
        .main-img { width: 100%; height: 50vh; object-fit: contain; background: #fff; }
        .content { padding: 25px; margin-bottom: 80px; }
        .swatch { width: 35px; height: 35px; border-radius: 50%; border: 2px solid #ddd; cursor: pointer; margin: 10px 5px; display: inline-block; }
        .swatch.active { border-color: var(--hafan-dark); transform: scale(1.2); }
        .footer-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: white; padding: 15px 20px; border-top: 1px solid #eee; z-index: 2100; }
        .add-btn { width: 100%; background: var(--dark-royal); color: white; border: none; border-radius: 10px; font-weight: 800; cursor: pointer; padding: 15px; font-size: 1rem; }

        /* Cart Page */
        .cart-page { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fafafa; z-index: 3000; display: none; flex-direction: column; }
        .cart-items-container { flex: 1; overflow-y: auto; padding-top: 10px; }
        .cart-item { display: flex; gap: 15px; background: white; padding: 12px; border-radius: 12px; margin: 8px 15px; align-items: center; position: relative; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .cart-item img { width: 60px; height: 60px; border-radius: 8px; object-fit: cover; }
        .remove-item { position: absolute; left: 15px; color: #ff4d4d; cursor: pointer; }
        .total-box { padding: 15px; text-align: center; font-weight: 900; font-size: 1.2rem; background: #fff; border-top: 1px solid #eee; }
        .input-lx { width: 100%; padding: 12px; border: 1px solid #eee; border-radius: 8px; margin-bottom: 10px; font-size: 1rem; outline: none; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo">YAAYAA</div>
        <div class="cart-icon" onclick="openCart()">
            <i class="fas fa-shopping-bag"></i>
            <span class="badge" id="cartBadge">0</span>
        </div>
    </nav>

    <div class="hero">
        <h1>YAAYAA STORE</h1>
        <p>Luxury Collections</p>
    </div>

    <div class="filter-tabs">
        <button class="tab-btn active" onclick="filterProducts('all', this)">الكل</button>
        <button class="tab-btn" onclick="filterProducts('bags', this)">الشنط</button>
        <button class="tab-btn" onclick="filterProducts('brooch', this)">بروشات</button>
    </div>

    <div class="container" id="bagGrid"></div>

    <div class="overlay" id="overlay">
        <div class="close" onclick="closeProduct()"><i class="fas fa-times"></i></div>
        <img src="" id="d-img" class="main-img">
        <div class="content">
            <h2 id="d-title"></h2>
            <p id="d-price" style="font-size: 1.4rem; font-weight: 900; color: var(--hafan-dark);"></p>
            <div style="margin: 20px 0;">
                <p id="variantLabel" style="font-weight:700;">الخيارات المتاحة:</p>
                <div id="swatchList"></div>
            </div>
            <div style="background: #fff; padding: 15px; border-radius: 10px; border-right: 4px solid var(--nude-logo);">
                <p style="color: #555; font-size: 0.9rem;">تصميم عصري من YAAYAA بخامات عالية الجودة تضمن لكِ الأناقة والتميز.</p>
            </div>
        </div>
        <div class="footer-bar">
            <button class="add-btn" onclick="addToCart()">🛍️ أضف إلى السلة</button>
        </div>
    </div>

    <div class="cart-page" id="cartPage">
        <div class="navbar">
            <div class="logo">سلتك ✨</div>
            <i class="fas fa-arrow-left" style="cursor:pointer" onclick="closeCart()"></i>
        </div>
        <div class="cart-items-container" id="cartList"></div>
        <div class="total-box" id="totalBox">الإجمالي: 0 EGP</div>
        
        <form action="https://formspree.io/f/xbdqogaw" method="POST" class="form-box" style="padding: 20px;" onsubmit="return validateForm()">
            <input type="hidden" name="تفاصيل الطلب" id="hiddenData">
            <input type="text" name="الاسم" class="input-lx" placeholder="الاسم بالكامل" required>
            <input type="tel" name="الموبايل" class="input-lx" placeholder="رقم الموبايل" required>
            <textarea name="العنوان" class="input-lx" placeholder="العنوان بالتفصيل" required></textarea>
            <button type="submit" class="add-btn" style="background: #22c55e;">تأكيد الطلب ✅</button>
        </form>
    </div>

    <script>
        const products = [
            { id: 1, category: "bags", name: "Couch Bag", price: 750, variants: [
                { color: "#FFFFFF", img: "https://i.ibb.co/7tqY7cT9/IMG-1886.jpg", name: "أبيض" },
                { color: "#1a1a1a", img: "https://i.ibb.co/G4V6qdCt/IMG-1885.jpg", name: "أسود" },
                { color: "#ffd700", img: "https://i.ibb.co/MyGZf3P7/IMG-1952.jpg", name: "ذهبي" }
            ]},
            { id: 2, category: "bags", name: "Lv Jeans", price: 1600, variants: [
                { color: "#6F8FAF", img: "https://i.ibb.co/7Jd6k9L2/eb1af371-9d7c-40d8-970b-c6060651d6b7.jpg", name: "جينس" }
          
            ]},
            { id: 3, category: "bags", name: "Lv Jeans", price: 2650, variants: [
                { color: "#6F8FAF", img: "https://i.ibb.co/0RZVPg2W/IMG-1955.jpg", name: "جينس" } 
            ]},
            { id: 4, category: "bags", name: "Lv Classic", price: 1700, variants: [
                { color: "#d5bca2", img: "https://i.ibb.co/zHf5Jwc6/IMG-1893.jpg", name: "بنى" } 
            ]},
            { id: 4, category: "bags", name: "Lv Classic", price: 450, variants: [
                { color: "#d5bca2", img: "https://i.ibb.co/FLt1nMbf/IMG-1956.jpg", name: "بنى" }     ]},
           ]},
        { id: 101, category: "brooch", name: "Ysl", price: 280, variants: [
                { color: "#ffd700", img: "https://i.ibb.co/7dwgLvZH/IMG-1937.png", name: "ذهبي" },
                { color: "#f0f0f0", img: "https://i.ibb.co/tPc1kCYX/IMG-1940.png", name: "لؤلؤى" }
            ]},
            { id: 102, category: "brooch", name: "loewe", price: 280, variants: [
                { color: "#ffd700", img: "https://i.ibb.co/wFq184F8/IMG-1942.png", name: "ذهبي" },
                { color: "#f0f0f0", img: "https://i.ibb.co/zTFQYsHw/IMG-1943.png", name: "لؤلؤي" } 
            ]},
            { id: 103, category: "brooch", name: "PRADA", price: 280, variants: [
                { color: "#0A0A0A", img: "https://i.ibb.co/Y7r75tkY/IMG-1951.png", name: "اسود" }, 
            ] }
        ];

        let cart = [];
        let currentProduct = null;
        let selectedVariant = null;

        function renderProducts(filter = 'all') {
            const grid = document.getElementById('bagGrid');
            const filtered = filter === 'all' ? products : products.filter(p => p.category === filter);
            
            grid.innerHTML = filtered.map(p => `
                <div class="card" onclick="viewProduct(${p.id})">
                    <img src="${p.variants[0].img}" alt="${p.name}">
                    <div class="card-info">
                        <div style="font-weight:700">${p.name}</div>
                        <div class="price">${p.price} EGP</div>
                    </div>
                </div>
            `).join('');
        }

        function filterProducts(category, btn) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderProducts(category);
        }

        function viewProduct(id) {
            currentProduct = products.find(p => p.id === id);
            selectedVariant = currentProduct.variants[0];
            updateOverlayUI();
            document.getElementById('overlay').style.display = 'block';
            document.body.style.overflow = 'hidden';
        }

        function updateOverlayUI() {
            document.getElementById('d-img').src = selectedVariant.img;
            document.getElementById('d-title').innerText = currentProduct.name;
            document.getElementById('d-price').innerText = currentProduct.price + " EGP";
            
            const sl = document.getElementById('swatchList');
            sl.innerHTML = currentProduct.variants.map((v) => `
                <div class="swatch ${v.name === selectedVariant.name ? 'active' : ''}" 
                     style="background:${v.color}" 
                     onclick="selectVariant('${v.name}')"></div>
            `).join('');
        }

        function selectVariant(vName) {
            selectedVariant = currentProduct.variants.find(v => v.name === vName);
            updateOverlayUI();
        }

        function addToCart() {
            cart.push({
                cartId: Date.now(),
                name: currentProduct.name,
                price: currentProduct.price,
                variantName: selectedVariant.name,
                img: selectedVariant.img
            });
            updateCartUI();
            closeProduct();
            
            const icon = document.querySelector('.cart-icon');
            icon.style.transform = 'scale(1.3)';
            setTimeout(() => icon.style.transform = 'scale(1)', 300);
        }

        function removeFromCart(cartId) {
            cart = cart.filter(item => item.cartId !== cartId);
            updateCartUI();
        }

        function updateCartUI() {
            const cl = document.getElementById('cartList');
            const badge = document.getElementById('cartBadge');
            const totalBox = document.getElementById('totalBox');
            
            badge.innerText = cart.length;
            let total = 0;
            let summaryText = "طلب جديد من المتجر:\n";

            cl.innerHTML = cart.map((item) => {
                total += item.price;
                summaryText += `- ${item.name} | اللون: ${item.variantName} | السعر: ${item.price} EGP\n`;
                return `
                    <div class="cart-item">
                        <img src="${item.img}">
                        <div>
                            <div style="font-weight:700">${item.name}</div>
                            <div style="font-size:0.8rem">اللون: ${item.variantName}</div>
                            <div style="font-weight:900">${item.price} EGP</div>
                        </div>
                        <i class="fas fa-trash remove-item" onclick="removeFromCart(${item.cartId})"></i>
                    </div>
                `;
            }).join('');

            totalBox.innerText = `الإجمالي: ${total} EGP`;
            document.getElementById('hiddenData').value = summaryText + `\nإجمالي الحساب: ${total} EGP`;
        }

        function openCart() { document.getElementById('cartPage').style.display = 'flex'; }
        function closeCart() { document.getElementById('cartPage').style.display = 'none'; }
        function closeProduct() { 
            document.getElementById('overlay').style.display = 'none'; 
            document.body.style.overflow = 'auto';
        }
        
        function validateForm() {
            if(cart.length === 0) { 
                alert("السلة فارغة! أضف منتجات أولاً."); 
                return false; 
            }
            return true;
        }

        renderProducts();
    </script>
</body>
</html>
