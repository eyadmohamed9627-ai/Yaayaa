<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yaayaa Bags - Girl Boss Vibes ✨</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 50%, #fecfef 100%);
            min-height: 100vh;
            color: #333;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .header {
            text-align: center; padding: 40px 0; background: rgba(255,255,255,0.9);
            backdrop-filter: blur(20px); border-radius: 30px; margin: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
        .logo {
            font-size: 3rem; background: linear-gradient(45deg, #ff6b9d, #c44569, #ff6b9d);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            font-weight: 700; margin-bottom: 10px;
        }
        .products-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px; padding: 20px;
        }
        .product-card {
            background: white; border-radius: 25px; overflow: hidden;
            box-shadow: 0 15px 30px rgba(0,0,0,0.1); transition: 0.4s;
        }
        .product-card:hover { transform: translateY(-10px); }
        .product-image { width: 100%; height: 280px; background: #f9f9f9; }
        .product-image img { width: 100%; height: 100%; object-fit: cover; }
        .product-info { padding: 20px; text-align: center; }
        .product-title { font-size: 1.2rem; font-weight: 600; color: #c44569; }
        .product-price { font-size: 1.4rem; color: #e17055; font-weight: 700; margin: 10px 0; }
        .add-to-cart {
            width: 100%; padding: 12px; background: linear-gradient(45deg, #ff6b9d, #c44569);
            color: white; border: none; border-radius: 20px; cursor: pointer; font-weight: 600;
        }
        .cart {
            position: fixed; top: 0; left: 0; height: 100%; width: 350px;
            background: white; z-index: 2000; padding: 25px;
            box-shadow: 5px 0 30px rgba(0,0,0,0.2);
            transform: translateX(-100%); transition: 0.4s; overflow-y: auto;
        }
        .cart.open { transform: translateX(0); }
        .cart-toggle {
            position: fixed; top: 25px; left: 25px; width: 60px; height: 60px;
            background: #c44569; border: none; border-radius: 50%;
            color: white; font-size: 1.5rem; cursor: pointer; z-index: 1000;
        }
        .order-form { display: flex; flex-direction: column; gap: 12px; margin-top: 20px; }
        .order-form input { padding: 12px; border-radius: 10px; border: 1px solid #ddd; outline: none; }
        .checkout-btn {
            background: #00b894; color: white; border: none; padding: 15px;
            border-radius: 25px; cursor: pointer; font-weight: 700; margin-top: 10px;
        }
        @media (max-width: 400px) { .cart { width: 100%; } }
    </style>
</head>
<body>

    <button class="cart-toggle" onclick="toggleCart()">
        <i class="fas fa-shopping-bag"></i>
    </button>

    <div class="cart" id="cart">
        <div style="display:flex; justify-content: space-between; align-items:center; margin-bottom: 20px;">
            <h3>شنطتك ✨</h3>
            <button onclick="toggleCart()" style="border:none; background:none; font-size: 2rem; cursor:pointer;">&times;</button>
        </div>
        <div id="cartItems" style="margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 10px;"></div>
        <div style="font-weight:700; font-size:1.3rem; margin-bottom: 20px;">
            الإجمالي: <span id="cartTotal">0</span> ج.م
        </div>

        <form id="orderForm" action="https://formspree.io/f/mqaeelre" method="POST" class="order-form">
            <h4 style="color: #c44569;">بيانات الشحن:</h4>
            <input type="text" name="الاسم" placeholder="الاسم بالكامل" required>
            <input type="tel" name="الموبايل" placeholder="رقم الموبايل" required>
            <input type="text" name="العنوان" placeholder="المحافظة / الشارع / رقم البيت" required>
            <input type="hidden" name="الطلبات" id="formOrderDetails">
            <input type="hidden" name="الاجمالي" id="formTotal">
            <button type="submit" class="checkout-btn">تأكيد الطلب 🚀</button>
        </form>
    </div>

    <div class="container">
        <header class="header">
            <h1 class="logo">Yaayaa Bags</h1>
            <p>أشيك شنط لأحلى بنوتات في مصر ✨</p>
        </header>
        <div class="products-grid" id="productsGrid"></div>
    </div>

    <script>
        // مصفوفة المنتجات - تقدر تغير البيانات هنا براحتك
        const products = [
            { id: 1, name: "شنطة بينك فيبز", price: 850, image: "https://images.unsplash.com/photo-1584917865442-de89df76afd3?q=80&w=1000" },
            { id: 2, name: "شنطة جولد تشين", price: 1200, image: "https://images.unsplash.com/photo-1591561954557-26941169b49e?q=80&w=1000" },
            { id: 3, name: "شنطة كلاسيك سوداء", price: 950, image: "https://images.unsplash.com/photo-1548036328-c9fa89d128fa?q=80&w=1000" }
        ];

        let cart = [];

        function renderProducts() {
            const grid = document.getElementById('productsGrid');
            grid.innerHTML = products.map(p => `
                <div class="product-card">
                    <div class="product-image"><img src="${p.image}" alt="${p.name}" onerror="this.src='https://via.placeholder.com/300?text=Image+Coming+Soon'"></div>
                    <div class="product-info">
                        <h3 class="product-title">${p.name}</h3>
                        <div class="product-price">${p.price} ج.م</div>
                        <button class="add-to-cart" onclick="addToCart(${p.id})">أضيفي للشنطة 🛍️</button>
                    </div>
                </div>
            `).join('');
        }

        function addToCart(id) {
            const product = products.find(p => p.id === id);
            cart.push(product);
            updateCart();
            alert('تمت الإضافة للشنطة! ✨');
        }

        function toggleCart() { document.getElementById('cart').classList.toggle('open'); }

        function updateCart() {
            const itemsDiv = document.getElementById('cartItems');
            const totalSpan = document.getElementById('cartTotal');
            if (cart.length === 0) {
                itemsDiv.innerHTML = '<p style="text-align:center;">السلة فاضية 😢</p>';
                totalSpan.innerText = '0';
                return;
            }
            itemsDiv.innerHTML = cart.map((item, index) => `
                <div style="display:flex; justify-content:space-between; margin-bottom:10px; font-size:0.9rem;">
                    <span>${item.name}</span>
                    <span>${item.price} ج.م <i class="fas fa-trash" onclick="removeItem(${index})" style="color:red; cursor:pointer; margin-right:10px;"></i></span>
                </div>
            `).join('');
            const total = cart.reduce((sum, item) => sum + item.price, 0);
            totalSpan.innerText = total;
            document.getElementById('formOrderDetails').value = cart.map(i => i.name).join(' - ');
            document.getElementById('formTotal').value = total + " EGP";
        }

        function removeItem(index) { cart.splice(index, 1); updateCart(); }

        document.getElementById('orderForm').onsubmit = function() {
            if (cart.length === 0) { alert('الشنطة فاضية!'); return false; }
            alert('تم استلام طلبك! هنكلمك فوراً لتأكيد الأوردر 💖');
        };

        renderProducts();
    </script>
</body>
</html>
