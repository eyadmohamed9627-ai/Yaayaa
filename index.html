<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YAAYAA STORE | Luxury Bags ✨</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --brand-color: #d4a373; /* لون ذهبي هادي / نود */
            --soft-pink: #fef1f2; /* خلفية ناعمة */
            --accent-pink: #fb7185; /* لون للخصومات */
            --white: #ffffff;
            --dark: #2d2d2d;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { background-color: var(--soft-pink); color: var(--dark); }

        /* الهيدر المودرن */
        .navbar { 
            padding: 20px; display: flex; justify-content: space-between; align-items: center; 
            background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px);
            position: sticky; top: 0; z-index: 1000; box-shadow: 0 4px 20px rgba(0,0,0,0.03);
        }
        .logo { font-weight: 900; font-size: 1.6rem; color: var(--dark); text-decoration: none; letter-spacing: 2px; }

        /* شبكة المنتجات */
        .container { padding: 20px; max-width: 1100px; margin: 0 auto; display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        
        .bag-card { 
            background: var(--white); border-radius: 20px; overflow: hidden; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.02); cursor: pointer; 
            transition: 0.3s ease; position: relative; border: 1px solid rgba(0,0,0,0.02);
        }
        .bag-card img { width: 100%; height: 240px; object-fit: cover; }
        
        /* علامة الخصم بشكل أشيك */
        .sale-badge { 
            position: absolute; top: 15px; left: 15px; 
            background: var(--accent-pink); color: white; padding: 5px 12px; 
            border-radius: 12px; font-size: 0.75rem; font-weight: 700; 
        }

        .bag-info { padding: 15px; text-align: center; }
        .bag-name { font-weight: 700; font-size: 1rem; margin-bottom: 8px; color: #444; }
        .price-container { display: flex; justify-content: center; align-items: baseline; gap: 8px; }
        .price-now { color: var(--brand-color); font-weight: 800; font-size: 1.2rem; }
        .price-was { color: #bbb; text-decoration: line-through; font-size: 0.9rem; }

        /* صفحة تفاصيل المنتج الـ Aesthetic */
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--white); z-index: 2000; display: none; overflow-y: auto;
            animation: slideUp 0.5s cubic-bezier(0.19, 1, 0.22, 1);
        }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

        .close-btn { position: fixed; top: 25px; right: 25px; z-index: 2100; background: var(--white); width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 5px 15px rgba(0,0,0,0.08); color: var(--dark); font-size: 1.2rem; }

        .details-img { width: 100%; height: 60vh; object-fit: cover; }
        .details-content { padding: 35px 25px; padding-bottom: 140px; max-width: 650px; margin: 0 auto; }
        .details-title { font-size: 2rem; font-weight: 900; margin-bottom: 15px; color: var(--dark); }
        
        .hero-price { display: flex; align-items: baseline; gap: 15px; margin-bottom: 30px; }
        .p-now { font-size: 2.5rem; font-weight: 900; color: var(--brand-color); }
        .p-was { font-size: 1.4rem; color: #ddd; text-decoration: line-through; }

        /* فورم بيانات الطلب */
        .order-form { 
            background: #fafafa; padding: 30px; border-radius: 25px; 
            border: 1px solid #eee; margin-top: 30px; 
        }
        .order-form h3 { margin-bottom: 25px; font-size: 1.3rem; font-weight: 800; text-align: center; color: var(--dark); }
        .input-item { 
            width: 100%; padding: 18px; margin-bottom: 15px; border: 1px solid #efefef; 
            border-radius: 15px; outline: none; transition: 0.3s; font-size: 1rem;
        }
        .input-item:focus { border-color: var(--brand-color); background: #fff; }

        /* بار التحكم السفلي */
        .bottom-checkout {
            position: fixed; bottom: 0; left: 0; width: 100%; background: var(--white);
            padding: 25px; display: flex; gap: 15px; box-shadow: 0 -15px 35px rgba(0,0,0,0.05); z-index: 2200;
        }
        .qty-input { display: flex; align-items: center; border: 1.5px solid #eee; border-radius: 18px; padding: 0 15px; }
        .qty-btn { border: none; background: none; font-size: 1.6rem; padding: 5px 12px; cursor: pointer; color: var(--brand-color); }

        .btn-confirm {
            flex: 1; background: var(--dark);
            color: white; border: none; border-radius: 18px; font-weight: 700; font-size: 1.1rem; cursor: pointer;
            transition: 0.3s ease;
        }
        .btn-confirm:hover { background: var(--brand-color); }

        @media (max-width: 600px) { .container { grid-template-columns: repeat(2, 1fr); gap: 12px; } }
    </style>
</head>
<body>

    <nav class="navbar">
        <i class="fas fa-ellipsis-h" style="color:var(--brand-color)"></i>
        <a href="#" class="logo">YAAYAA</a>
        <i class="fas fa-shopping-bag" style="color:var(--brand-color)"></i>
    </nav>

    <div class="container" id="bagGrid"></div>

    <div class="overlay" id="overlay">
        <div class="close-btn" onclick="closeProduct()"><i class="fas fa-times"></i></div>
        <img src="" id="d-img" class="details-img">
        
        <div class="details-content">
            <h1 id="d-title" class="details-title"></h1>
            <div class="hero-price">
                <span class="p-now" id="d-price"></span>
                <span class="p-was" id="d-old"></span>
            </div>

            <form action="https://formspree.io/f/xjgjkvqv" method="POST" class="order-form">
                <h3>بيانات التوصيل ✨🛍️</h3>
                <input type="hidden" name="الموديل" id="h-name">
                <input type="hidden" name="السعر الإجمالي" id="h-price">
                <input type="hidden" name="الكمية" id="h-qty" value="1">

                <input type="text" name="الاسم" class="input-item" placeholder="الاسم بالكامل" required>
                <input type="tel" name="الموبايل" class="input-item" placeholder="رقم الموبايل" required>
                <textarea name="العنوان" class="input-item" rows="3" placeholder="العنوان بالتفصيل" required></textarea>

                <div class="bottom-checkout">
                    <div class="qty-input">
                        <button type="button" class="qty-btn" onclick="setQty(-1)">-</button>
                        <span id="qty-num" style="margin: 0 12px; font-weight:800;">1</span>
                        <button type="button" class="qty-btn" onclick="setQty(1)">+</button>
                    </div>
                    <button type="submit" class="btn-confirm">إتمام الطلب الآن</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // --- 👜 مصفوفة المنتجات (الشنط) 👜 ---
        const bags = [
            { id: 1, name: "Coach Luxury Nude", price: 1250, oldPrice: 1800, image: "https://i.ibb.co/PsNk8D6b/IMG-1874.jpg" },
            { id: 2, name: "Chanel Classic Black", price: 1600, oldPrice: 2200, image: "https://i.ibb.co/3c3M6xX/chanel-cap.jpg" },
            { id: 3, name: "Dior Saddle Bag", price: 1400, oldPrice: 1950, image: "https://i.ibb.co/1Kk7L6x/dior-set.jpg" },
            { id: 4, name: "Prada Pink Edition", price: 1100, oldPrice: 1500, image: "https://i.ibb.co/0V2N7xW/diesel-cap.jpg" }
        ];

        function render() {
            const grid = document.getElementById('bagGrid');
            grid.innerHTML = bags.map(b => `
                <div class="bag-card" onclick="openProduct(${b.id})">
                    <div class="sale-badge">SALE</div>
                    <img src="${b.image}">
                    <div class="bag-info">
                        <div class="bag-name">${b.name}</div>
                        <div class="price-container">
                            <span class="price-now">LE ${b.price}</span>
                            <span class="price-was">LE ${b.oldPrice}</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function openProduct(id) {
            const b = bags.find(x => x.id === id);
            document.getElementById('d-img').src = b.image;
            document.getElementById('d-title').innerText = b.name;
            document.getElementById('d-price').innerText = "LE " + b.price;
            document.getElementById('d-old').innerText = "LE " + b.oldPrice;
            
            document.getElementById('h-name').value = b.name;
            document.getElementById('h-price').value = b.price + " LE";
            
            document.getElementById('overlay').style.display = 'block';
            document.body.style.overflow = 'hidden';
        }

        function closeProduct() {
            document.getElementById('overlay').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        function setQty(n) {
            let d = document.getElementById('qty-num');
            let h = document.getElementById('h-qty');
            let v = parseInt(d.innerText) + n;
            if(v < 1) v = 1;
            d.innerText = v;
            h.value = v;
        }

        render();
    </script>
</body>
</html>
