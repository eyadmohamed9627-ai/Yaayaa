<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سلة المشتريات - Yaayaa</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <!-- Header (نفس الـ header من index.html) -->
    <!-- ... Header code هنا ... -->

    <section class="cart-page">
        <div class="container">
            <h1 class="page-title">سلة المشتريات</h1>
            <div class="cart-container">
                <div class="cart-items" id="cartItems">
                    <!-- هتتحمل ديناميكياً -->
                </div>
                <div class="cart-summary">
                    <h3>ملخص الطلب</h3>
                    <div class="summary-row">
                        <span>عدد المنتجات:</span>
                        <span id="cartTotalItems">0</span>
                    </div>
                    <div class="summary-row total">
                        <span>الإجمالي:</span>
                        <span id="cartTotalPrice">0 جنيه</span>
                    </div>
                    <button class="checkout-btn" id="checkoutBtn">
                        <i class="fas fa-credit-card"></i>
                        إتمام الطلب
                    </button>
                </div>
            </div>
        </div>
    </section>

    <!-- Payment Modal -->
    <div class="modal" id="paymentModal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>طريقة الدفع</h2>
            <div class="payment-methods">
                <label class="payment-method">
                    <input type="radio" name="payment" value="cash" checked>
                    <i class="fas fa-money-bill-wave"></i>
                    <span>الدفع عند الاستلام</span>
                </label>
                <label class="payment-method">
                    <input type="radio" name="payment" value="fawry">
                    <i class="fas fa-university"></i>
                    <span>فوري</span>
                </label>
            </div>
            <button class="confirm-payment" id="confirmPayment">تأكيد الطلب</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
