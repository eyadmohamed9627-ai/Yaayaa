<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yaayaa Admin | لوحة التحكم</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #000000;
            --secondary: #555555;
            --bg: #f8f9fa;
            --white: #ffffff;
            --shadow: 0 4px 12px rgba(0,0,0,0.1);
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar - القائمة الجانبية (نفس روح Step 1) */
        .sidebar {
            width: 260px;
            background: var(--white);
            border-left: 1px solid #eee;
            display: flex;
            flex-direction: column;
            padding: 30px 20px;
            box-shadow: var(--shadow);
            position: fixed;
            height: 100%;
            right: 0; /* عشان الموقع RTL */
        }

        .sidebar .brand {
            font-size: 28px;
            font-weight: bold;
            letter-spacing: 4px;
            text-align: center;
            margin-bottom: 50px;
            color: var(--primary);
        }

        .sidebar nav a {
            text-decoration: none;
            color: var(--secondary);
            padding: 15px 20px;
            border-radius: 10px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: 0.3s;
        }

        .sidebar nav a:hover, .sidebar nav a.active {
            background: var(--primary);
            color: var(--white);
        }

        /* المحتوى الرئيسي */
        .main-content {
            margin-right: 260px; /* مسافة للسيدبار */
            padding: 40px;
            width: 100%;
        }

        .header {
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 24px;
            margin: 0;
            color: var(--primary);
        }

        /* كارت إضافة المنتج */
        .admin-card {
            background: var(--white);
            padding: 35px;
            border-radius: 20px;
            box-shadow: var(--shadow);
            max-width: 550px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--secondary);
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 15px;
            outline: none;
            box-sizing: border-box;
            transition: 0.3s;
        }

        .form-group input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(0,0,0,0.05);
        }

        .submit-btn {
            width: 100%;
            padding: 15px;
            background: var(--primary);
            color: var(--white);
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .submit-btn:hover {
            opacity: 0.8;
            transform: translateY(-2px);
        }

        @media (max-width: 768px) {
            .sidebar { display: none; }
            .main-content { margin-right: 0; padding: 20px; }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="brand">YAAYAA</div>
        <nav>
            <a href="#" class="active"><i class="fas fa-plus-square"></i> إضافة منتج</a>
            <a href="index.html"><i class="fas fa-eye"></i> معاينة الموقع</a>
            <a href="#"><i class="fas fa-box"></i> المنتجات</a>
            <a href="#"><i class="fas fa-sign-out-alt"></i> خروج</a>
        </nav>
    </div>

    <div class="main-content">
        <div class="header">
            <h1>إدارة الكوليكشن</h1>
            <p style="color: #888;">أضف منتجات جديدة لمتجر Yaayaa</p>
        </div>

        <div class="admin-card">
            <div class="form-group">
                <label>اسم الشنطة</label>
                <input type="text" id="name" placeholder="مثلاً: شنطة ظهر جلد">
            </div>
            <div class="form-group">
                <label>السعر (EGP)</label>
                <input type="text" id="price" placeholder="مثلاً: 1200">
            </div>
            <div class="form-group">
                <label>رابط الصورة</label>
                <input type="text" id="image" placeholder="ضع رابط الصورة هنا">
            </div>
            <div class="form-group">
                <label>الفئة</label>
                <input type="text" id="category" placeholder="جلد، قماش، يد...">
            </div>

            <button class="submit-btn" onclick="saveProduct()">
                <i class="fas fa-save"></i> حفظ في الكوليكشن
            </button>
        </div>
    </div>

    <script>
        async function saveProduct() {
            const btn = document.querySelector('.submit-btn');
            const scriptURL = 'حط_لينك_الـAPPS_SCRIPT_بتاعك_هنا';

            const data = {
                name: document.getElementById('name').value,
                price: document.getElementById('price').value,
                image: document.getElementById('image').value,
                category: document.getElementById('category').value
            };

            if(!data.name || !data.price || !data.image) {
                alert("برجاء ملء البيانات المطلوبة");
                return;
            }

            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري الحفظ...';
            btn.disabled = true;

            try {
                // الربط مع Google Sheets
                await fetch(scriptURL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify(data)
                });
                alert("تمت إضافة المنتج لـ Yaayaa بنجاح!");
                location.reload();
            } catch (error) {
                alert("حدث خطأ في الرفع");
                console.error(error);
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-save"></i> حفظ في الكوليكشن';
            }
        }
    </script>
</body>
</html>
